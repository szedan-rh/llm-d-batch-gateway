# Scenario 3: AIMD only (processor-side adaptive concurrency)
# Sync dispatch with AIMD enabled. llm-d Router flow control disabled.
#
# Lower concurrency than S2 (perEndpoint: 30 vs 100) — this is the primary
# gating mechanism. Fewer concurrent batch requests mean less GPU contention
# during interactive bursts. AIMD acts as a safety net that would further
# reduce concurrency if the backend returns 429/5xx under severe load.
processor:
  config:
    dispatchMode: sync
    concurrency:
      global: 60
      perEndpoint: 30
      recovery: 5
      aimd:
        enabled: true
        min: 5
        backoffFactor: 0.5
        additiveIncrease: 1
    modelGateways:
      Qwen/Qwen3-0.6B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "30s"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "10s"
      Qwen/Qwen3-8B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "30s"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "10s"
      Qwen/Qwen3-32B-AWQ:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "30s"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "10s"
