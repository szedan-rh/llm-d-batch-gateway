# Scenario 6: Low batch concurrency (simplest protection)
# Fixed low perEndpoint concurrency, AIMD disabled, no router-side protection.
# The only gating mechanism is the processor's concurrency cap.
# Baseline for measuring the value of smarter protection (S3, S4).
processor:
  config:
    dispatchMode: sync
    concurrency:
      global: 60
      perEndpoint: 20
      recovery: 5
      aimd:
        enabled: false
    modelGateways:
      Qwen/Qwen3-0.6B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
      Qwen/Qwen3-8B:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
      Qwen/Qwen3-32B-AWQ:
        url: "http://llm-d-inference-gateway-istio:80"
        requestTimeout: "5m"
        maxRetries: 3
        initialBackoff: "1s"
        maxBackoff: "60s"
